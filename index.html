*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f7fb;--panel:#fff;--line:#d8dee9;--line2:#b8c2d2;--text:#111827;--muted:#64748b;--soft:#eef3f8;--accent:#2563eb;--accent2:#1d4ed8;--danger:#dc2626;--key:#fff;--key2:#e9eef6;--cn:"Noto Sans SC","Microsoft YaHei",SimSun,serif;--ui:"Noto Sans KR",system-ui,sans-serif}
html,body{min-height:100%}body{font-family:var(--ui);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45}button,.key{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
header{height:52px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:5}.logo{font-weight:800;font-size:17px;display:flex;align-items:center;gap:8px}.logo img{height:26px;width:26px;display:block}.logo span{color:var(--accent)}
main{width:min(940px,100%);margin:0 auto;padding:14px 12px 32px}.output-box,.panel{overflow-x:auto;background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}.output-box{margin-bottom:12px}.output-bar{height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--line)}.label{font-size:12px;font-weight:800;color:var(--muted)}.btns{display:flex;gap:6px}.btn{height:32px;padding:0 12px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--text);font:700 12px var(--ui);cursor:pointer}.btn:hover{border-color:var(--line2);background:var(--soft)}.btn.danger{color:var(--danger)}
#out{min-height:96px;padding:14px 16px;font:28px/1.5 var(--cn);white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-all;max-width:100%;overflow:hidden;letter-spacing:.02em;cursor:text}#out:empty:before{content:"입력 영역";font:13px var(--ui);color:#94a3b8;letter-spacing:0}.caret{display:inline-block;width:2px;height:1em;background:var(--accent);vertical-align:text-bottom;margin:0 -1px;animation:blink 1s steps(1) infinite}@keyframes blink{50%{opacity:0}}.tabs{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:8px 8px 0 0;overflow-x:auto}.tab{padding:12px 15px;border:0;border-bottom:2px solid transparent;background:#fff;color:var(--muted);font:800 13px var(--ui);white-space:nowrap;cursor:pointer}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}.panel{overflow-x:auto;border-top:0;border-radius:0 0 8px 8px}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);background:#fff}.title{font-weight:800;font-size:13px}.hint{font-size:11px;color:var(--muted)}
.panel{overflow-x:auto;}
.compose{display:none;padding:10px 14px;border-bottom:1px solid #bfdbfe;background:#e0f2fe;color:#1d4ed8;font-weight:700;min-height:42px;width:max-content;min-width:100%;white-space:nowrap;box-shadow:inset 0 -1px 0 rgba(59,130,246,.15)}.compose.show{display:block;width:max-content;min-width:100%}.compose span{display:inline-block;font-family:ui-monospace,Menlo,Consolas,monospace;white-space:nowrap;text-align:left}.cands{display:none;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px;padding:8px 10px;border-bottom:1px solid var(--line);background:#f8fafc}.cands{overflow:hidden}.cands.show{display:grid}.cand{min-height:40px;border:1px solid var(--line);border-radius:6px;background:#fff;font:22px var(--cn);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}.cand small{font:10px var(--ui);color:var(--muted)}.cand.sel{border-color:var(--accent);background:#eff6ff;color:var(--accent)}
.kb-wrap{padding:12px 8px 10px;overflow-x:auto}.kb{display:flex;flex-direction:column;gap:6px;min-width:320px}.row{display:flex;justify-content:center;gap:5px}.key{height:42px;min-width:34px;flex:1;border:1px solid var(--line);border-radius:6px;background:var(--key);box-shadow:0 1px 2px rgba(15,23,42,.08);font:800 15px var(--ui);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}.key:active{background:#dbeafe}.key.fn{background:var(--key2);font-size:12px;color:#475569}.key.primary{background:var(--accent);border-color:var(--accent2);color:#fff}.key.shift-active{background:#fef3c7;border-color:#f59e0b;color:#92400e}.key.space{flex:5}.key.wide{flex:1.6}.key.cn{font-family:var(--cn);font-size:20px}.info{padding:9px 12px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);background:#f8fafc}
.toast{position:fixed;left:50%;bottom:18px;transform:translate(-50%,45px);opacity:0;background:#111827;color:#fff;border-radius:999px;padding:8px 16px;font:800 12px var(--ui);transition:.18s;z-index:20}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:640px){header{height:48px}main{padding:10px 8px 24px}.tab{padding:11px 12px}.panel-head{align-items:flex-start;flex-direction:column}.hint{display:none}#out{font-size:24px;min-height:86px;padding:12px}.cands{grid-template-columns:repeat(3,minmax(0,1fr))}.kb-wrap{padding:10px 4px}.kb{min-width:0;gap:5px}.row{gap:4px}.key{height:39px;min-width:0;font-size:14px;padding:0 3px}.key.fn{font-size:11px}.btn{height:31px;padding:0 10px}}
</style>

function norm(s){return s.toLowerCase().replace(/u:/g,'v').replace(/ü/g,'v').replace(/[Üǖǘǚǜ]/g,'v').replace(/[^a-zv]/g,'')}
function toneNum(){const m=buf.match(/[1-5]$/);return m?Number(m[0]):0}
function hasTone(){return toneNum()>0}
function baseBuf(){return norm(buf)}

// 대소문자를 보존하면서 병음 성조 마킹
// buf 예: "Wo3" → "Wǒ", "NI3" → "NǏ"
function markPinyin(){
  let s=buf;
  if(!s)return '';
  // v/V 처리
  s=s.replace(/[Vv]/g,c=>c==='V'?'V':'v');
  // u: → v
  s=s.replace(/[Uu]:/g,m=>m[0]==='U'?'V':'v');

  // 모음 바로 뒤 숫자: 대소문자 보존하여 성조 적용
  s=s.replace(/([AaEeIiOoUuVv])([1-5])/g,(m,v,t)=>{
    const lo=v.toLowerCase()==='v'?'v':v.toLowerCase();
    const marked=toneMap[lo]?toneMap[lo][Number(t)-1]:v;
    return v===v.toUpperCase()&&v!==v.toLowerCase() ? marked.toUpperCase() : marked;
  });

  // 끝 숫자는 남은 음절의 일반 규칙으로 적용
  const m=s.match(/([1-5])$/);
  if(m){
    const tone=Number(m[1]);
    s=s.slice(0,-1);
    const lo=s.toLowerCase();
    let target='';
    if(lo.includes('a')) target='a';
    else if(lo.includes('e')) target='e';
    else if(lo.includes('ou')) target='o';
    else {
      const x=lo.match(/[iou]/g);
      target=x?x[x.length-1]:'';
    }
    if(target){
      // 원본 s에서 마지막 해당 모음 위치 찾기 (대소문자 무관)
      const idxLo=lo.lastIndexOf(target);
      const origChar=s[idxLo];
      const isUp=origChar===origChar.toUpperCase()&&origChar!==origChar.toLowerCase();
      const marked=toneMap[target][tone-1];
      s=s.slice(0,idxLo)+(isUp?marked.toUpperCase():marked)+s.slice(idxLo+1);
    }
  }
  // v/V → ü/Ü
  s=s.replace(/V/g,'Ü').replace(/v/g,'ü');
  return s;
}

function pyCandidates(){
  const b=baseBuf();
  if(!b)return [];
  return dict[b] ? [...dict[b]] : [];
}
function wuCandidates(){const b=buf.toLowerCase();return b?(wubiDict[b]||[]):[]}
function candidates(){if(mode==='pinyin')return pyCandidates();if(mode==='wubi')return wuCandidates();return[]}
function candidateList(){
  if(!buf)return [];
  const marked=markPinyin();
  const cs=candidates();
  if(hasTone()) return cs.length ? cs : [marked || (baseBuf() || buf)];
  const raw=marked || (baseBuf() || buf);
  return [raw,...cs];
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function render(){
  if(out){
    const before=escapeHtml(out.slice(0,cursorPos));
    const after=escapeHtml(out.slice(cursorPos));
    outEl.innerHTML=before+'<span class="caret"></span>'+after;
  } else {
    outEl.innerHTML='';
  }
  bufEl.textContent=buf ? (mode==='pinyin' ? markPinyin() : buf) : '';
  bufEl.classList.toggle('show', !!buf);
  candsEl.innerHTML='';
  const list=candidateList();
  list.slice(0,30).forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='cand'+(i===sel?' sel':'');
    b.textContent=c;
    b.onclick=()=>commit(false,i);
    candsEl.appendChild(b);
  });
  candsEl.classList.toggle('show', list.length>0);
  // shift 버튼 시각 업데이트
  document.querySelectorAll('.shift-btn').forEach(btn=>{
    if(shiftActive==='lock'){
      btn.className='key fn wide shift-btn shift-active';
      btn.textContent='⇪ CAPS';
    } else if(shiftActive){
      btn.className='key fn wide shift-btn shift-active';
      btn.textContent='⇧ Shift';
    } else {
      btn.className='key fn wide shift-btn';
      btn.textContent='⇧ Shift';
    }
  });
  // 문자 키 대소문자 업데이트
  const isUpper = shiftActive === true || shiftActive === 'lock';
  document.querySelectorAll('.letter-key').forEach(btn=>{
    const base=btn.dataset.letter;
    btn.textContent = isUpper ? (base==='v'?'Ü':base.toUpperCase()) : (base==='v'?'ü':base);
  });
}

// 커서 위치에 문자열 삽입/삭제
function insertAtCursor(text){
  out=out.slice(0,cursorPos)+text+out.slice(cursorPos);
  cursorPos+=text.length;
}
function deleteBeforeCursor(){
  if(cursorPos>0){out=out.slice(0,cursorPos-1)+out.slice(cursorPos);cursorPos--}
}
function deleteAfterCursor(){
  if(cursorPos<out.length){out=out.slice(0,cursorPos)+out.slice(cursorPos+1)}
}
function moveCursor(delta){
  cursorPos=Math.max(0,Math.min(out.length,cursorPos+delta));
  render();
}
// 화살표 키: 후보 선택 중이면 후보 이동, 아니면 출력 텍스트 커서 이동
function arrowKey(delta){
  if(buf){moveSel(delta)} else {moveCursor(delta)}
}

function add(s){insertAtCursor(s);render()}
function clearAll(){out='';buf='';sel=0;cursorPos=0;lastAction=null;shiftActive=false;render()}
function backspace(){if(buf){buf=buf.slice(0,-1)}else{deleteBeforeCursor()}sel=0;lastAction=null;render()}
function commit(addExtra,index){if(index===undefined)index=sel;if(buf){if(mode==='bopomofo'){insertAtCursor(buf)}else{const list=candidateList();insertAtCursor(list[index]??list[0]??markPinyin()??buf)}buf='';sel=0}if(addExtra)insertAtCursor(addExtra);render()}

function toggleShift(){
  if(shiftActive===false) shiftActive=true;
  else if(shiftActive===true) shiftActive='lock';
  else shiftActive=false;
  render();
}

function smartSpace(){
  if(mode==='bopomofo'){add(' ');return}
  if(buf){commit(false);recordAction('commit-space')}
  else if(wasJust('commit-space')){insertAtCursor(' ');render();recordAction('space')}
  else{insertAtCursor(' ');render();recordAction('space')}
}
function smartEnter(){
  if(mode==='bopomofo'){add('\n');return}
  if(buf){commit(false);recordAction('commit-enter')}
  else if(wasJust('commit-enter')){insertAtCursor('\n');render();recordAction('newline')}
  else{insertAtCursor('\n');render();recordAction('newline')}
}
function quickPick(n){if(buf&&mode!=='bopomofo'){commit(false,n-1);recordAction('commit-num');return true}return false}

// 글자 입력: 대문자(Shift)여도 예비창(버퍼)에 그대로 쌓여서
// 성조 숫자(1-5)를 이어서 입력할 수 있도록 처리.
// forceUpper가 주어지면 그 값을 우선 사용(실제 키보드의 Shift 키 입력용), 없으면 화면 Shift 상태를 따름.
function inputLetter(ch, forceUpper){
  const isUpper = forceUpper!==undefined ? forceUpper : (shiftActive===true || shiftActive==='lock');
  if(mode==='bopomofo'){
    if(isUpper){
      // 대문자: 버퍼에 저장 (주음부호 기호로 바꾸지 않고 로마자 그대로 보관)
      buf+=ch.toUpperCase();
      sel=0;
    } else {
      insertAtCursor(bpPhysical[ch.toLowerCase()]||ch);
    }
    if(shiftActive===true) shiftActive=false; // 한 번 shift는 한 글자 후 해제
    render();
    return;
  }
  if(mode==='wubi'){buf+=ch.toLowerCase();sel=0;render();return}
  // 한어병음: 대소문자를 그대로 버퍼에 저장 → 예비창에 표시되고 성조 입력 가능
  buf += isUpper ? ch.toUpperCase() : ch.toLowerCase();
  sel=0;lastAction=null;
  if(shiftActive===true) shiftActive=false; // 한 번 shift는 한 글자 후 해제
  render();
}

function inputTone(n){
  if(mode==='pinyin'){
    if(buf){
      const last=(buf[buf.length-1]||'').toLowerCase();
      if('aeiouvü'.includes(last) && ['1','2','3','4','5'].includes(String(n))){
        buf=buf.replace(/[1-5]+$/,'')+n;
      }else{
        buf+=String(n);
      }
      sel=0;render();return;
    }
    add(String(n));return;
  }
  if(mode==='bopomofo'){add({'1':'ˉ','2':'ˊ','3':'ˇ','4':'ˋ','5':'˙'}[n]);return;}
  add(String(n));
}
function moveSel(delta){const count=candsEl.querySelectorAll('.cand').length;if(!count)return;sel=(sel+delta+count)%count;render()}
function otherChar(ch){if(buf)commit(false);add(ch)}
function copyOut(){if(!out)return;navigator.clipboard.writeText(out).then(showToast).catch(()=>{const t=document.createElement('textarea');t.value=out;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();showToast()})}
function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1400)}

function mkKey(text,cls,fn){const b=document.createElement('button');b.className='key '+cls;b.textContent=text;b.onclick=fn;return b}

function buildKeyboard(){
  kbEl.innerHTML='';
  if(mode==='bopomofo'){
    bpRows.forEach(r=>{const row=document.createElement('div');row.className='row';r.forEach(([c])=>row.appendChild(mkKey(c,'cn',()=>add(c))));kbEl.appendChild(row)});
    addBottomRow(['⌫','fn wide',backspace],['←','fn',()=>arrowKey(-1)],['Space','fn space',()=>add(' ')],['→','fn',()=>arrowKey(1)],['Enter','primary wide',()=>add('\n')]);
    return;
  }
  if(mode==='wubi'){
    wubiRows.forEach((r,idx)=>{
      const row=document.createElement('div');row.className='row';
      if(idx===2)row.appendChild(mkKey('⌫','fn wide',backspace));
      r.forEach(([c,root])=>{const b=document.createElement('button');b.className='key';b.innerHTML='<span style="font-size:15px">'+c+'</span><span style="font:600 9px var(--ui);color:#94a3b8;display:block;margin-top:1px">'+root+'</span>';b.onclick=()=>inputLetter(c);row.appendChild(b)});
      if(idx===2)row.appendChild(mkKey('↵','primary wide',smartEnter));
      kbEl.appendChild(row);
    });
    addBottomRow(['Space','fn space',smartSpace],['↵','primary wide',smartEnter],['←','fn',()=>arrowKey(-1)],['→','fn',()=>arrowKey(1)]);
    return;
  }
  // 한어병음
  const isUpper = shiftActive===true || shiftActive==='lock';
  // 숫자(성조) 행 - 키보드 맨 위에 배치
  const nums=document.createElement('div');nums.className='row';
  // 숫자키 행에도 기본 기호 추가
  const numSymbols=[['1','!'],['2','@'],['3','#'],['4','$'],['5','%'],['6','^'],['7','&'],['8','*'],['9','('],['0',')']];
  numSymbols.forEach(([num,sym])=>{
    const btn=document.createElement('button');
    btn.className='key fn';
    const isS=shiftActive===true||shiftActive==='lock';
    btn.textContent=isS?sym:num;
    btn.onclick=()=>{
      if(shiftActive===true||shiftActive==='lock'){
        if(buf)commit(false);
        add(sym);
        if(shiftActive===true)shiftActive=false;
        render();
      } else {
        inputTone(num);
      }
    };
    nums.appendChild(btn);
  });
  kbEl.appendChild(nums);
  letterRows.forEach((r,idx)=>{
    const row=document.createElement('div');row.className='row';
    // Shift 키 (세 번째 줄 왼쪽)
    if(idx===2){
      const shiftBtn=document.createElement('button');
      shiftBtn.className='key fn wide shift-btn'+(shiftActive?' shift-active':'');
      shiftBtn.textContent=shiftActive==='lock'?'⇪ CAPS':'⇧ Shift';
      shiftBtn.onclick=toggleShift;
      row.appendChild(shiftBtn);
    } else if(idx===0){
      // 첫째 줄 왼쪽에 ⌫
    }
    r.forEach(k=>{
      const btn=document.createElement('button');
      btn.className='key letter-key';
      btn.dataset.letter=k;
      btn.textContent=isUpper?(k==='v'?'Ü':k.toUpperCase()):(k==='v'?'ü':k);
      btn.onclick=()=>inputLetter(k);
      row.appendChild(btn);
    });
    if(idx===0){
      // 첫째 줄 끝에 ⌫
      row.appendChild(mkKey('⌫','fn wide',backspace));
    } else if(idx===2){
      row.appendChild(mkKey('↵','primary wide',smartEnter));
    }
    kbEl.appendChild(row);
  });
  // 기호 및 기능 행
  addBottomRow(
    ['Space','fn space',smartSpace],
    ['↵','primary wide',smartEnter],
    ['←','fn',()=>arrowKey(-1)],
    ['→','fn',()=>arrowKey(1)],
    ['，','fn',()=>otherChar('，')],
    ['。','fn',()=>otherChar('。')]
  );
}

function addBottomRow(...items){
  const row=document.createElement('div');row.className='row';
  items.forEach(([t,cls,fn])=>row.appendChild(mkKey(t,cls,fn)));
  kbEl.appendChild(row);
}

function setMode(next){
  mode=next;buf='';sel=0;lastAction=null;shiftActive=false;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===mode));
  const names={pinyin:'한어병음 한자 변환',bopomofo:'주음부호 자판',wubi:'오필자형 자판'};
  panelTitle.textContent=names[mode];
  panelHint.textContent=mode==='bopomofo'?'화면 키 또는 실제 키보드로 입력':'성조 1-5 · 방향키로 후보 이동 · Shift: 대문자 직접 입력 · Enter·Space 두 번 → 줄바꿈·공백';
  buildKeyboard();render();
}

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>setMode(t.dataset.tab));
document.getElementById('copyBtn').onclick=copyOut;
document.getElementById('clearBtn').onclick=clearAll;

// 실제 키보드 이벤트
document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey)return;

  // Shift 단독 키
  if(e.key==='Shift'){
    // Shift 단독 키다운은 상태 토글하지 않음 (keyup에서 처리 or 글자와 함께 처리)
    return;
  }
  // CapsLock
  if(e.key==='CapsLock'){
    e.preventDefault();
    shiftActive = shiftActive==='lock' ? false : 'lock';
    render();
    return;
  }

  if(e.key==='Backspace'){e.preventDefault();backspace();return}
  if(e.key==='Enter'){e.preventDefault();smartEnter();return}
  if(e.key===' '){e.preventDefault();smartSpace();return}
  if(e.key==='ArrowRight'){e.preventDefault();arrowKey(1);return}
  if(e.key==='ArrowLeft'){e.preventDefault();arrowKey(-1);return}
  if(e.key==='ArrowDown'){e.preventDefault();moveSel(1);return}
  if(e.key==='ArrowUp'){e.preventDefault();moveSel(-1);return}
  if(e.key==='Home'){e.preventDefault();if(!buf){cursorPos=0;render()}return}
  if(e.key==='End'){e.preventDefault();if(!buf){cursorPos=out.length;render()}return}
  if(e.key==='Delete'){e.preventDefault();if(!buf){deleteAfterCursor();render()}return}

  // Shift+숫자 = 기호 직접 출력
  if(e.shiftKey && /^[0-9]$/.test(e.key)){
    e.preventDefault();
    const symMap={'1':'!','2':'@','3':'#','4':'$','5':'%','6':'^','7':'&','8':'*','9':'(','0':')'};
    if(buf)commit(false);
    add(symMap[e.key]||e.key);
    return;
  }

  // 숫자 (성조 or 직접)
  if(/^[1-5]$/.test(e.key)&&!e.shiftKey){e.preventDefault();inputTone(e.key);return}
  if(/^[6-9]$/.test(e.key)&&!e.shiftKey){e.preventDefault();if(!quickPick(Number(e.key)-5))add(e.key);return}
  if(e.key==='0'&&!e.shiftKey){e.preventDefault();add('0');return}

  // 알파벳: shiftKey 여부로 대소문자 결정. 대문자도 버퍼에 쌓여 성조 입력 가능.
  if(/^[a-zA-Z]$/.test(e.key)){
    e.preventDefault();
    const isUpperInput = e.shiftKey ^ (shiftActive==='lock'); // XOR: shift+capslock = 소문자
    inputLetter(e.key.toLowerCase(), !!isUpperInput);
    return;
  }

  // 기타 문자
  if(e.key.length===1){e.preventDefault();otherChar(e.key)}
});

// 출력창 클릭/탭 → 그 위치로 커서 이동
function offsetFromPoint(x,y){
  let range=null;
  if(document.caretRangeFromPoint){
    range=document.caretRangeFromPoint(x,y);
  } else if(document.caretPositionFromPoint){
    const pos=document.caretPositionFromPoint(x,y);
    if(pos){range=document.createRange();range.setStart(pos.offsetNode,pos.offset)}
  }
  if(!range)return null;
  const node=range.startContainer,off=range.startOffset;
  if(!outEl.contains(node))return null;
  const walker=document.createTreeWalker(outEl,NodeFilter.SHOW_TEXT);
  let total=0,n;
  while(n=walker.nextNode()){
    if(n===node)return total+off;
    total+=n.textContent.length;
  }
  return total;
}
outEl.addEventListener('click',e=>{
  const pos=offsetFromPoint(e.clientX,e.clientY);
  if(pos===null)return;
  if(buf)commit(false);
  cursorPos=Math.max(0,Math.min(out.length,pos));
  render();
});

buildKeyboard();render();
</script>
</body>
</html>
