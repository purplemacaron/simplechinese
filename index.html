<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SimpleChinese</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f7fb;--panel:#fff;--line:#d8dee9;--line2:#b8c2d2;--text:#111827;--muted:#64748b;--soft:#eef3f8;--accent:#2563eb;--accent2:#1d4ed8;--danger:#dc2626;--key:#fff;--key2:#e9eef6;--cn:"Noto Sans SC","Microsoft YaHei",SimSun,serif;--ui:"Noto Sans KR",system-ui,sans-serif}
html,body{min-height:100%}
body{font-family:var(--ui);background:var(--bg);color:var(--text);font-size:14px;line-height:1.45}
header{height:52px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:5}
.logo{font-weight:800;font-size:17px}.logo span{color:var(--accent)}
main{width:min(920px,100%);margin:0 auto;padding:14px 12px 32px}
.output-box,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}.output-box{margin-bottom:12px}
.output-bar{height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--line)}
.label{font-size:12px;font-weight:700;color:var(--muted)}.btns{display:flex;gap:6px}
button,.key{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.btn{height:32px;padding:0 12px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--text);font:600 12px var(--ui);cursor:pointer}.btn:hover{border-color:var(--line2);background:var(--soft)}.btn.danger{color:var(--danger)}
#out{min-height:92px;padding:14px 16px;font:28px/1.5 var(--cn);white-space:pre-wrap;word-break:break-word;letter-spacing:.02em}#out:empty:before{content:"입력 영역";font:13px var(--ui);color:#94a3b8;letter-spacing:0}
.tabs{display:flex;gap:0;background:var(--panel);border:1px solid var(--line);border-radius:8px 8px 0 0;overflow-x:auto}.tab{padding:12px 15px;border:0;border-bottom:2px solid transparent;background:#fff;color:var(--muted);font:700 13px var(--ui);white-space:nowrap;cursor:pointer}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel{border-top:0;border-radius:0 0 8px 8px}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);background:#fff}.title{font-weight:800;font-size:13px}.hint{font-size:11px;color:var(--muted)}
.compose{display:none;padding:8px 12px;border-bottom:1px solid #bfdbfe;background:#eff6ff;color:var(--accent);font-weight:700;min-height:38px}.compose.show{display:block}.compose span{font-family:ui-monospace,Menlo,Consolas,monospace}
.cands{display:none;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px;padding:8px 10px;border-bottom:1px solid var(--line);background:#f8fafc}.cands.show{display:grid}.cand{min-height:38px;border:1px solid var(--line);border-radius:6px;background:#fff;font:22px var(--cn);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}.cand small{font:10px var(--ui);color:var(--muted)}.cand.sel{border-color:var(--accent);background:#eff6ff;color:var(--accent)}
.kb-wrap{padding:12px 8px 10px;overflow-x:auto}.kb{display:flex;flex-direction:column;gap:6px;min-width:310px}.row{display:flex;justify-content:center;gap:5px}.key{height:42px;min-width:34px;flex:1;border:1px solid var(--line);border-radius:6px;background:var(--key);box-shadow:0 1px 2px rgba(15,23,42,.08);font:700 15px var(--ui);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}.key:active{background:#dbeafe}.key.fn{background:var(--key2);font-size:12px;color:#475569}.key.primary{background:var(--accent);border-color:var(--accent2);color:#fff}.key.space{flex:5}.key.wide{flex:1.6}.key span{display:block}.sub{font-size:9px;color:#94a3b8;font-weight:600;margin-top:1px}.stack{flex-direction:column}
.info{padding:9px 12px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);background:#f8fafc}.toast{position:fixed;left:50%;bottom:18px;transform:translate(-50%,45px);opacity:0;background:#111827;color:#fff;border-radius:999px;padding:8px 16px;font:700 12px var(--ui);transition:.18s;z-index:20}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:640px){header{height:48px}main{padding:10px 8px 24px}.tab{padding:11px 12px}.panel-head{align-items:flex-start;flex-direction:column}.hint{display:none}#out{font-size:24px;min-height:86px;padding:12px}.cands{grid-template-columns:repeat(3,minmax(0,1fr))}.kb-wrap{padding:10px 4px}.kb{min-width:0;gap:5px}.row{gap:4px}.key{height:39px;min-width:0;font-size:14px;padding:0 3px}.key.fn{font-size:11px}.btn{height:31px;padding:0 10px}}
</style>
</head>
<body>
<header><div class="logo">Simple<span>Chinese</span></div></header>
<main>
  <section class="output-box">
    <div class="output-bar"><span class="label">출력</span><div class="btns"><button class="btn" id="copyBtn">복사</button><button class="btn danger" id="clearBtn">지우기</button></div></div>

    <div class="kb-wrap"><div class="kb" id="keyboard"></div></div>
    <div class="info">기본 키보드와 화면 키보드를 모두 지원합니다.</div>
  </section>
</main>

function pick(n){if(buf&&n>=1&&n<=9)commit(false,n-1);else add(String(n))}
function otherChar(ch){if(buf)commit(false);add(ch)}
function buildKeyboard(){kbEl.innerHTML='';rows.forEach((r,idx)=>{const row=document.createElement('div');row.className='row';if(idx===2)row.appendChild(key('⌫','fn wide',backspace));r.forEach(k=>row.appendChild(key(k+(k==='v'?' / ü':''),'stack',()=>inputLetter(k))));if(idx===2)row.appendChild(key('Enter','primary wide',()=>commit(false)));kbEl.appendChild(row)});const nums=document.createElement('div');nums.className='row';for(let i=1;i<=9;i++)nums.appendChild(key(String(i),'fn',()=>pick(i)));kbEl.appendChild(nums);const bottom=document.createElement('div');bottom.className='row';bottom.appendChild(key('Space','fn space',()=>commit(true)));bottom.appendChild(key('，','fn',()=>otherChar('，')));bottom.appendChild(key('。','fn',()=>otherChar('。')));bottom.appendChild(key('？','fn',()=>otherChar('？')));kbEl.appendChild(bottom)}
function key(text,cls,fn){const b=document.createElement('button');b.className='key '+cls;b.textContent=text;b.onclick=fn;return b}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');mode=t.dataset.tab;buf='';sel=0;panelTitle.textContent=mode==='roman'?'로마자 자판':'한어병음 한자 변환';render()});
document.getElementById('copyBtn').onclick=copyOut;document.getElementById('clearBtn').onclick=clearAll;
document.addEventListener('keydown',e=>{if(e.ctrlKey||e.metaKey||e.altKey)return;if(e.key==='Backspace'){e.preventDefault();backspace();return}if(e.key==='Enter'){e.preventDefault();commit(false);return}if(e.key===' '){e.preventDefault();commit(true);return}if(/^[1-9]$/.test(e.key)){e.preventDefault();pick(Number(e.key));return}if(/^[a-zA-Z]$/.test(e.key)){e.preventDefault();inputLetter(e.key);return}if(e.key.length===1){e.preventDefault();otherChar(e.key)}});
buildKeyboard();render();
</script>
</body>
</html>
