<title>SimpleChinese</title>
<style>

:root{--bg:#f5f7fb;--panel:#fff;--line:#d8dee9;--line2:#b8c2d2;--text:#111827;--muted:#64748b;--soft:#eef3f8;--accent:#2563eb;--accent2:#1d4ed8;--danger:#dc2626;--key:#fff;--key2:#e9eef6;--cn:"Noto Sans SC","Microsoft YaHei",SimSun,serif;--ui:"Noto Sans KR",system-ui,sans-serif}

header{height:52px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:5}.logo{font-weight:800;font-size:17px}.logo span{color:var(--accent)}
main{width:min(940px,100%);margin:0 auto;padding:14px 12px 32px}.output-box,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}.output-box{margin-bottom:12px}.output-bar{height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--line)}.label{font-size:12px;font-weight:800;color:var(--muted)}.btns{display:flex;gap:6px}.btn{height:32px;padding:0 12px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--text);font:700 12px var(--ui);cursor:pointer}.btn:hover{border-color:var(--line2);background:var(--soft)}.btn.danger{color:var(--danger)}

.kb-wrap{padding:12px 8px 10px;overflow-x:auto}.kb{display:flex;flex-direction:column;gap:6px;min-width:320px}.row{display:flex;justify-content:center;gap:5px}.key{height:42px;min-width:34px;flex:1;border:1px solid var(--line);border-radius:6px;background:var(--key);box-shadow:0 1px 2px rgba(15,23,42,.08);font:800 15px var(--ui);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}.key:active{background:#dbeafe}.key.fn{background:var(--key2);font-size:12px;color:#475569}.key.primary{background:var(--accent);border-color:var(--accent2);color:#fff}.key.space{flex:5}.key.wide{flex:1.6}.key.cn{font-family:var(--cn);font-size:20px}.info{padding:9px 12px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);background:#f8fafc}
.toast{position:fixed;left:50%;bottom:18px;transform:translate(-50%,45px);opacity:0;background:#111827;color:#fff;border-radius:999px;padding:8px 16px;font:800 12px var(--ui);transition:.18s;z-index:20}.toast.show{opacity:1;transform:translate(-50%,0)}

</style>

function norm(s){return s.toLowerCase().replace(/u:/g,'v').replace(/ü/g,'v').replace(/[^a-zv]/g,'')}
function toneNum(){const m=buf.match(/[1-5]$/);return m?Number(m[0]):0}
function baseBuf(){return norm(buf)}
function markPinyin(){const tone=toneNum();let s=baseBuf();if(!s)return '';if(!tone||tone===5)return s.replace(/v/g,'ü');let target='';if(s.includes('a'))target='a';else if(s.includes('e'))target='e';else if(s.includes('ou'))target='o';else{const m=s.match(/[iuv](?!.*[iuv])/);target=m?m[0]:''}if(!target)return s;const idx=s.lastIndexOf(target);return(s.slice(0,idx)+toneMap[target][tone-1]+s.slice(idx+1)).replace(/v/g,'ü')}
function pyCandidates(){const b=baseBuf();return b?(dict[b]||[]):[]}
function wuCandidates(){const b=buf.toLowerCase();return b?(wubiDict[b]||[]):[]}
function candidates(){if(mode==='pinyin')return pyCandidates();if(mode==='wubi')return wuCandidates();return[]}
function candidateList(){
  const marked=markPinyin();
  const cs=candidates();
  // 첫 번째 후보: 병음 그대로(성조기호 포함), 이후 한자 후보
  const raw=marked||(baseBuf()||buf);
  return[raw,...cs];
}
function render(){
  outEl.textContent=out;
  // 예비창: 성조기호 적용된 병음만 표시 (buf 원문 숫자 제거)
  const marked=markPinyin();
  bufEl.textContent=marked||(baseBuf()||buf)||'';
  composeEl.classList.toggle('show',!!buf);
  const list=buf&&mode!=='bopomofo'?candidateList().slice(0,18):[];
  candsEl.classList.toggle('show',list.length>0);
  candsEl.innerHTML='';
  if(list.length){
    if(sel>=list.length)sel=list.length-1;
    if(sel<0)sel=0;
    list.forEach((text,i)=>{const b=document.createElement('button');b.className='cand '+(i===sel?'sel':'');b.innerHTML='<small>'+(i===0?'―':i)+'</small><span>'+text+'</span>';b.onclick=()=>commit(false,i);candsEl.appendChild(b)});
  }
}
function add(s){out+=s;render()}
function clearAll(){out='';buf='';sel=0;lastAction=null;render()}
function backspace(){if(buf)buf=buf.slice(0,-1);else out=out.slice(0,-1);sel=0;lastAction=null;render()}
function commit(addExtra,index){if(index===undefined)index=sel;if(buf){if(mode==='bopomofo'){out+=buf}else{const list=candidateList();out+=(list[index]??list[0]??markPinyin()??buf)}buf='';sel=0}if(addExtra)out+=addExtra;render()}

function smartSpace(){
  if(mode==='bopomofo'){add(' ');return}
  if(buf){commit(false);recordAction('commit-space')}
  else if(wasJust('commit-space')){out+=' ';render();recordAction('space')}
  else{out+=' ';render();recordAction('space')}
}
function smartEnter(){
  if(mode==='bopomofo'){add('\n');return}
  if(buf){commit(false);recordAction('commit-enter')}
  else if(wasJust('commit-enter')){out+='\n';render();recordAction('newline')}
  else{out+='\n';render();recordAction('newline')}
}
function quickPick(n){if(buf&&mode!=='bopomofo'){commit(false,n-1);recordAction('commit-num');return true}return false}
function inputLetter(ch){
  if(mode==='bopomofo'){out+=bpPhysical[ch.toLowerCase()]||ch;render();return}
  if(mode==='wubi'){buf+=ch.toLowerCase();sel=0;render();return}
  buf+=ch.toLowerCase();sel=0;lastAction=null;render()
}
function inputTone(n){
  if(mode==='pinyin'&&buf){buf=buf.replace(/[1-5]$/,'')+n;sel=0;render()}
  else if(mode==='bopomofo'){add({'1':'ˉ','2':'ˊ','3':'ˇ','4':'ˋ','5':'˙'}[n])}
  else add(String(n))
}
function moveSel(delta){const count=candsEl.querySelectorAll('.cand').length;if(!count)return;sel=(sel+delta+count)%count;render()}
function otherChar(ch){if(buf)commit(false);add(ch)}
function copyOut(){if(!out)return;navigator.clipboard.writeText(out).then(showToast).catch(()=>{const t=document.createElement('textarea');t.value=out;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();showToast()})}
function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1400)}

function mkKey(text,cls,fn){const b=document.createElement('button');b.className='key '+cls;b.textContent=text;b.onclick=fn;return b}
function buildKeyboard(){
  kbEl.innerHTML='';
  if(mode==='bopomofo'){
    bpRows.forEach(r=>{const row=document.createElement('div');row.className='row';r.forEach(([c])=>row.appendChild(mkKey(c,'cn',()=>add(c))));kbEl.appendChild(row)});
    addBottomRow(['⌫','fn wide',backspace],['Space','fn space',()=>add(' ')],['Enter','primary wide',()=>add('\n')]);
    return;
  }
  if(mode==='wubi'){
    wubiRows.forEach((r,idx)=>{
      const row=document.createElement('div');row.className='row';
      if(idx===2)row.appendChild(mkKey('⌫','fn wide',backspace));
      r.forEach(([c,root])=>{const b=document.createElement('button');b.className='key';b.innerHTML='<span style="font-size:15px">'+c+'</span><span style="font:600 9px var(--ui);color:#94a3b8;display:block;margin-top:1px">'+root+'</span>';b.onclick=()=>inputLetter(c);row.appendChild(b)});
      if(idx===2)row.appendChild(mkKey('↵','primary wide',smartEnter));
      kbEl.appendChild(row);
    });
    addBottomRow(['Space','fn space',smartSpace],['↵','primary wide',smartEnter],['←','fn',()=>moveSel(-1)],['→','fn',()=>moveSel(1)]);
    return;
  }
  // 한어병음 / 로마자
  letterRows.forEach((r,idx)=>{
    const row=document.createElement('div');row.className='row';
    if(idx===2)row.appendChild(mkKey('⌫','fn wide',backspace));
    r.forEach(k=>row.appendChild(mkKey(k==='v'?'ü':k,'',()=>inputLetter(k))));
    if(idx===2)row.appendChild(mkKey('↵','primary wide',smartEnter));
    kbEl.appendChild(row);
  });
  const nums=document.createElement('div');nums.className='row';
  for(let i=1;i<=5;i++)nums.appendChild(mkKey(String(i),'fn',()=>inputTone(i)));
  kbEl.appendChild(nums);
  addBottomRow(['Space','fn space',smartSpace],['↵','primary wide',smartEnter],['←','fn',()=>moveSel(-1)],['→','fn',()=>moveSel(1)],['，','fn',()=>otherChar('，')],['。','fn',()=>otherChar('。')]);
}
function addBottomRow(...items){
  const row=document.createElement('div');row.className='row';
  items.forEach(([t,cls,fn])=>row.appendChild(mkKey(t,cls,fn)));
  kbEl.appendChild(row);
}
function setMode(next){
  mode=next;buf='';sel=0;lastAction=null;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===mode));
  const names={pinyin:'한어병음 한자 변환',roman:'로마자 자판',bopomofo:'주음부호 자판',wubi:'오필자형 자판'};
  panelTitle.textContent=names[mode];
  panelHint.textContent=mode==='bopomofo'?'화면 키 또는 실제 키보드로 입력':'성조 1-5 · 방향키로 후보 이동 · Enter·Space 두 번 → 줄바꿈·공백';
  infoEl.textContent=mode==='bopomofo'?'Space는 공백, Enter는 줄바꿈입니다.':'Enter·Space: 버퍼 있으면 확정 / 연속 2번이면 줄바꿈·공백';
  buildKeyboard();render();
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>setMode(t.dataset.tab));
document.getElementById('copyBtn').onclick=copyOut;
document.getElementById('clearBtn').onclick=clearAll;
document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(e.key==='Backspace'){e.preventDefault();backspace();return}
  if(e.key==='Enter'){e.preventDefault();smartEnter();return}
  if(e.key===' '){e.preventDefault();smartSpace();return}
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();moveSel(1);return}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();moveSel(-1);return}
  if(/^[6-9]$/.test(e.key)){e.preventDefault();if(!quickPick(Number(e.key)-5))add(e.key);return}
  if(/^[1-5]$/.test(e.key)){e.preventDefault();inputTone(e.key);return}
  if(/^[a-zA-Z]$/.test(e.key)){e.preventDefault();inputLetter(e.key);return}
  if(e.key.length===1){e.preventDefault();otherChar(e.key)}
